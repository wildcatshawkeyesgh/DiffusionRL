seed: 42

# Game
action_dim: 64
state_shape: [3, 8, 8]

# Diffusion
T: 30
hidden_dim: 64
beta_start: 0.0001
beta_end: 0.02
denoiser_type: attn   # mlp | attn
num_heads: 4

# Bootstrap
num_bootstrap_games: 750

# Self-improvement loop
num_iterations: 100
steps_per_iter: 500
games_per_iter: 30
batch_size: 128
lr: 0.0003
eta_min: 1.0e-6           # cosine annealing floor
buffer_max_triples: 100000

# Self-play exploration
selfplay_temperature: 1.0  # >0 sampled, 0 argmax; used by training games only
temp_drop_move: 15         # after this move count, temperature drops to 0

# Advantage weighting for policy loss
# - none:       weights = (outcome + 1) / 2 (legacy)
# - raw:        weights = outcome            (negative signal from losses)
# - verifier:   weights = outcome - V(s,a)   (per-move advantage via verifier)
advantage_mode: verifier
advantage_clip: 1.0        # clip |advantage| to this (tanh-like stability)

# Checkpointing
checkpoint_dir: checkpoints
checkpoint_every: 10
eval_every: 5
eval_games: 100
onnx_every: 10             # export ONNX every N iterations (0 = only at end)

# Watch mode
watch_delay: 0.5
